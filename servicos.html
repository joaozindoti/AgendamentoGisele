<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serviços — Studio Gisele Lima</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css">
</head>
<body>

<!-- ═══════════ HEADER ═══════════ -->
<header class="flow-header">
  <div class="flow-header__side">
    <a href="index.html" class="btn-back">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 14L6 9L11 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Início
    </a>
  </div>
  <a href="index.html"><img src="assets/fotos/logo.webp" alt="Gisele Lima — Estética Feminina" class="flow-header__logo"></a>
  <div class="flow-header__side"></div>
</header>

<!-- ═══════════ PROGRESSO ═══════════ -->
<div class="progress">
  <div class="progress__inner">
    <div class="step">
      <div class="step__num active">1</div>
      <span class="step__label active">Serviços</span>
    </div>
    <div class="step__line pending"></div>
    <div class="step">
      <div class="step__num pending">2</div>
      <span class="step__label pending">Data e Hora</span>
    </div>
    <div class="step__line pending"></div>
    <div class="step">
      <div class="step__num pending">3</div>
      <span class="step__label pending">WhatsApp</span>
    </div>
  </div>
</div>

<!-- ═══════════ CONTEÚDO ═══════════ -->
<div class="flow-content">
  <p class="flow-intro">Selecione quantos serviços quiser — o horário será reservado para tudo de uma vez.</p>
  <div class="badge-row no-scrollbar" id="badgeRow"></div>
  <div id="servicesGrid"></div>
  <div class="mini-footer">
    <a href="precadastro.html" class="mini-footer__link"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg> Cadastre-se uma vez e receba descontos especiais direto no seu WhatsApp</a>
  </div>
</div>

<!-- ═══════════ BARRA FLUTUANTE ═══════════ -->
<div class="bar" id="bar">
  <div>
    <p class="bar__count" id="barCount"></p>
    <p class="bar__total" id="barTotal"></p>
  </div>
  <button class="btn btn-gold" onclick="goToHorario()">Escolher horário →</button>
</div>

<script src="js/utils.js"></script>
<script src="js/services.js"></script>
<script src="js/store.js"></script>
<script>
var selectedIds = [];
var activeCat = 'all';

function saveSelection() {
  Store.save(SERVICES.filter(function (s) { return selectedIds.indexOf(s.id) > -1; }));
}

function renderBadges() {
  document.getElementById('badgeRow').innerHTML = CATS.map(function (c) {
    return '<button class="badge' + (c.key === activeCat ? ' active' : '') + '" onclick="filterCat(\'' + c.key + '\')">' + c.label + '</button>';
  }).join('');
}

function cardHtml(s) {
  var sel = selectedIds.indexOf(s.id) > -1;
  var priceHtml = s.price === null
    ? '<span class="card-price card-price--consult">Consulte o valor</span>'
    : '<span class="card-price">' + fmtCurrency(s.price) + '</span>';
  var premiumHtml = s.premium ? '<span class="badge-premium">Premium</span>' : '';
  return '<div class="service-card' + (sel ? ' selected' : '') + '" data-id="' + s.id + '" onclick="toggleService(\'' + s.id + '\')">' +
    '<div class="card-head"><div><p class="card-name">' + s.name + premiumHtml + '</p>' +
    '<p class="card-desc">' + s.description + '</p></div>' +
    '<span class="card-check"><svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L3.8 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span></div>' +
    '<div class="card-divider"></div>' +
    '<div class="card-foot">' + priceHtml +
    '<span class="card-time"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M6 3.5V6L7.5 7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>' + fmtDuration(s.duration) + '</span></div>' +
    '</div>';
}

/* Cards agrupados por categoria, com foto de contexto no topo de cada grupo */
function renderCards() {
  var groups = CATS.filter(function (c) {
    return c.key !== 'all' && (activeCat === 'all' || c.key === activeCat);
  });
  document.getElementById('servicesGrid').innerHTML = groups.map(function (c) {
    var banner = c.photo
      ? '<div class="cat-banner cat-banner--' + c.key + '"><img src="' + c.photo + '" alt="' + c.alt + '" loading="lazy">' +
        '<div class="cat-banner__caption"><span class="cat-banner__label">' + c.label + '</span>' +
        (c.sub ? '<span class="cat-banner__sub">' + c.sub + '</span>' : '') + '</div></div>'
      : '';
    var cards = getByCategory(c.key).map(cardHtml).join('');
    return '<section class="cat-group">' + banner + '<div class="services-grid">' + cards + '</div></section>';
  }).join('');
}

function toggleService(id) {
  var idx = selectedIds.indexOf(id);
  if (idx > -1) selectedIds.splice(idx, 1); else selectedIds.push(id);
  var card = document.querySelector('.service-card[data-id="' + id + '"]');
  if (card) card.classList.toggle('selected', selectedIds.indexOf(id) > -1);
  saveSelection();
  updateBar();
}

function filterCat(cat) {
  activeCat = cat;
  renderBadges();
  renderCards();
}

function updateBar() {
  var bar = document.getElementById('bar');
  var sel = SERVICES.filter(function (s) { return selectedIds.indexOf(s.id) > -1; });
  if (!sel.length) { bar.classList.remove('visible'); return; }

  document.getElementById('barCount').textContent =
    sel.length + ' serviço' + (sel.length > 1 ? 's' : '') + ' · ' + fmtDuration(Store.totalDuration(sel));

  var totalNum = Store.totalPrice(sel);
  var totalEl = document.getElementById('barTotal');
  if (!Store.hasUnpriced(sel)) {
    totalEl.textContent = fmtCurrency(totalNum);
  } else if (totalNum === 0) {
    totalEl.innerHTML = '<small>A consultar</small>';
  } else {
    totalEl.innerHTML = fmtCurrency(totalNum) + ' <small>+ consulta</small>';
  }

  bar.classList.add('visible');
}

function goToHorario() {
  if (!selectedIds.length) return;
  location.href = 'horario.html';
}

// Init — restaura seleção anterior, se houver
(function () {
  selectedIds = Store.load().map(function (s) { return s.id; });
  renderBadges();
  renderCards();
  updateBar();
})();
</script>
</body>
</html>
