<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horário — Studio Gisele Lima</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css">
</head>
<body>

<!-- ═══════════ HEADER ═══════════ -->
<header class="flow-header">
  <div class="flow-header__side">
    <a href="servicos.html" class="btn-back">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 14L6 9L11 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Serviços
    </a>
  </div>
  <a href="index.html"><img src="assets/fotos/logo.webp" alt="Gisele Lima — Estética Feminina" class="flow-header__logo"></a>
  <div class="flow-header__side"></div>
</header>

<!-- ═══════════ PROGRESSO ═══════════ -->
<div class="progress">
  <div class="progress__inner">
    <div class="step">
      <div class="step__num done">
        <svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1.5" stroke="#B8935F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="step__label done">Serviços</span>
    </div>
    <div class="step__line done"></div>
    <div class="step">
      <div class="step__num active">2</div>
      <span class="step__label active">Data e Hora</span>
    </div>
    <div class="step__line pending"></div>
    <div class="step">
      <div class="step__num pending">3</div>
      <span class="step__label pending">WhatsApp</span>
    </div>
  </div>
</div>

<!-- ═══════════ CONTEÚDO ═══════════ -->
<div class="flow-content">

  <!-- Resumo -->
  <div class="summary" id="summaryBox">
    <div class="summary__toggle" onclick="toggleSummary()">
      <span class="summary__label">Resumo dos serviços</span>
      <span class="summary__arrow open" id="summaryArrow">▾</span>
    </div>
    <div class="summary__body open" id="summaryBody">
      <ul class="summary__list" id="summaryList"></ul>
      <div class="summary__footer">
        <span class="summary__duration" id="summaryDuration"></span>
        <span class="summary__total" id="summaryTotal"></span>
      </div>
    </div>
  </div>

  <!-- Calendário -->
  <div style="margin-bottom:32px">
    <span class="section-label">Escolha a data</span>
    <div class="cal-nav">
      <button class="cal-nav__btn" id="btnPrev" onclick="prevMonth()">←</button>
      <span class="cal-nav__title" id="calTitle"></span>
      <button class="cal-nav__btn" onclick="nextMonth()">→</button>
    </div>
    <div class="cal-weekdays">
      <div class="cal-weekday sun">Dom</div>
      <div class="cal-weekday">Seg</div>
      <div class="cal-weekday">Ter</div>
      <div class="cal-weekday">Qua</div>
      <div class="cal-weekday">Qui</div>
      <div class="cal-weekday">Sex</div>
      <div class="cal-weekday">Sáb</div>
    </div>
    <div id="calGrid">
      <div class="skeleton-grid">
        <div class="sk sk-cell"></div><div class="sk sk-cell"></div><div class="sk sk-cell"></div><div class="sk sk-cell"></div><div class="sk sk-cell"></div><div class="sk sk-cell"></div><div class="sk sk-cell"></div>
      </div>
      <div class="skeleton-grid" style="margin-top:3px">
        <div class="sk sk-cell"></div><div class="sk sk-cell"></div><div class="sk sk-cell"></div><div class="sk sk-cell"></div><div class="sk sk-cell"></div><div class="sk sk-cell"></div><div class="sk sk-cell"></div>
      </div>
      <div class="skeleton-grid" style="margin-top:3px">
        <div class="sk sk-cell"></div><div class="sk sk-cell"></div><div class="sk sk-cell"></div><div class="sk sk-cell"></div><div class="sk sk-cell"></div><div class="sk sk-cell"></div><div class="sk sk-cell"></div>
      </div>
    </div>
  </div>

  <!-- Horários -->
  <div id="timesSection" style="display:none">
    <span class="section-label">Horários disponíveis</span>
    <span class="date-label" id="dateLabel"></span>
    <div class="times-grid" id="timesGrid"></div>
    <p class="times-hint">Clique no horário para abrir o WhatsApp com o agendamento preenchido.</p>
  </div>

</div>

<script src="js/utils.js"></script>
<script src="js/services.js"></script>
<script src="js/store.js"></script>
<script src="js/calendar.js"></script>
<script src="js/whatsapp.js"></script>
<script>
/* ── Serviços selecionados ── */
var services = Store.load();
if (!services.length) location.href = 'servicos.html';

var totalDur = Store.totalDuration(services);
var curY, curMo, selDay, sumOpen = true;

/* ── Resumo ── */
function renderSummary() {
  document.getElementById('summaryList').innerHTML = services.map(function (s) {
    var priceCls = s.price === null ? ' consult' : '';
    return '<li class="summary__item"><span>' + s.name + '</span>' +
      '<span class="summary__item-price' + priceCls + '">' + fmtPrice(s.price) + '</span></li>';
  }).join('');

  document.getElementById('summaryDuration').textContent = 'Duração: ' + fmtDuration(totalDur);
  document.getElementById('summaryTotal').textContent = Store.hasUnpriced(services)
    ? 'Total: a confirmar'
    : 'Total: ' + fmtCurrency(Store.totalPrice(services));
}

function toggleSummary() {
  sumOpen = !sumOpen;
  document.getElementById('summaryBody').classList.toggle('open', sumOpen);
  document.getElementById('summaryArrow').classList.toggle('open', sumOpen);
}

/* ── Calendário ── */
function renderCalendar(y, mo) {
  curY = y; curMo = mo; selDay = null;
  document.getElementById('calTitle').textContent = fmtMonthYear(y, mo);
  var now = new Date();
  document.getElementById('btnPrev').disabled = (y === now.getFullYear() && mo === now.getMonth());

  var first = new Date(y, mo, 1).getDay();
  var days = new Date(y, mo + 1, 0).getDate();
  var avail = getAvailableDays(y, mo, totalDur);

  var html = '<div class="cal-grid">';
  for (var i = 0; i < first; i++) html += '<div class="cal-cell empty"></div>';
  for (var d = 1; d <= days; d++) {
    var ok = avail.indexOf(d) > -1;
    var cls = 'cal-cell' + (ok ? ' available' + (isToday(y, mo, d) ? ' today' : '') : ' past');
    html += '<div id="calday-' + d + '" class="' + cls + '"' + (ok ? ' onclick="selectDay(' + y + ',' + mo + ',' + d + ')"' : '') + '>' + d + '</div>';
  }
  html += '</div>';
  document.getElementById('calGrid').innerHTML = html;
  document.getElementById('timesSection').style.display = 'none';
}

function selectDay(y, mo, d) {
  if (selDay) {
    var prev = document.getElementById('calday-' + selDay);
    if (prev) {
      prev.classList.remove('selected');
      prev.classList.add('available');
      if (isToday(y, mo, selDay)) prev.classList.add('today');
    }
  }
  selDay = d;
  var cell = document.getElementById('calday-' + d);
  if (cell) { cell.classList.remove('available', 'today'); cell.classList.add('selected'); }

  var sec = document.getElementById('timesSection');
  sec.style.display = 'block';
  document.getElementById('dateLabel').textContent = fmtDateFull(y, mo, d);
  setTimeout(function () { sec.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 60);
  loadSlots(y, mo, d);
}

/* ── Horários do dia — via webhook real de disponibilidade ── */

function renderTimesLoading() {
  document.getElementById('timesGrid').innerHTML =
    '<p class="times-loading">Carregando horários disponíveis...</p>';
}

function renderTimesError(y, mo, d) {
  document.getElementById('timesGrid').innerHTML =
    '<div class="no-slots">Não foi possível carregar os horários agora.<strong>Tente novamente.</strong>' +
    '<button type="button" class="btn btn-gold btn-sm" style="margin-top:16px" onclick="loadSlots(' + y + ',' + mo + ',' + d + ')">Tentar novamente</button></div>';
}

function renderTimesEmpty() {
  document.getElementById('timesGrid').innerHTML =
    '<div class="no-slots">Não há horários disponíveis neste dia.<strong>Escolha outra data.</strong></div>';
}

function renderSlots(times) {
  // manhã = antes do almoço; tarde = após retorno (Seg: tudo é tarde)
  var lunchStart = 12 * 60;
  var manha = times.filter(function (t) { return toMin(t) < lunchStart; });
  var tarde = times.filter(function (t) { return toMin(t) >= lunchStart; });

  function pills(list) {
    return list.map(function (t) {
      return '<button class="time-pill" onclick="selectTime(\'' + t + '\')">' + t + '</button>';
    }).join('');
  }

  var html = '';
  if (manha.length) html += '<p class="times-group-label">Manhã</p>' + pills(manha);
  if (tarde.length) html += '<p class="times-group-label" style="margin-top:' + (manha.length ? '16px' : '4px') + '">Tarde</p>' + pills(tarde);
  document.getElementById('timesGrid').innerHTML = html;
}

async function loadSlots(y, mo, d) {
  renderTimesLoading();
  try {
    var times = await fetchHorariosDisponiveis(y, mo + 1, d, totalDur);
    if (!times.length) { renderTimesEmpty(); return; }
    renderSlots(times);
  } catch (e) {
    console.warn('Falha ao buscar horários disponíveis:', e);
    renderTimesError(y, mo, d);
  }
}

function selectTime(time) {
  openWhatsApp(services, curY, curMo, selDay, time);
  Store.clear();
}

function prevMonth() {
  var now = new Date();
  if (curY === now.getFullYear() && curMo === now.getMonth()) return;
  if (--curMo < 0) { curMo = 11; curY--; }
  renderCalendar(curY, curMo);
}

function nextMonth() {
  if (++curMo > 11) { curMo = 0; curY++; }
  renderCalendar(curY, curMo);
}

/* ── Init ── */
renderSummary();
var now = new Date();
curY = now.getFullYear(); curMo = now.getMonth();
setTimeout(function () { renderCalendar(curY, curMo); }, 300);
</script>
</body>
</html>
